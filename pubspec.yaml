name: OnwaPay
description: A new Flutter project
publish_to: "none"

version: 1.0.0+1

environment:
  sdk: ">=3.4.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  # UI & essentials
  cupertino_icons: ^1.0.8
  provider: ^6.1.2
  intl: ^0.19.0
  http: ^1.2.1
  shared_preferences: ^2.2.2
  fluttertoast: ^8.2.1

  # 🚀 Firebase (latest stable for Flutter 3.4+)
  firebase_core: ^3.6.0
  firebase_auth: ^5.2.0
  cloud_firestore: ^5.4.4

  # 📱 Utilities & features
  permission_handler: ^11.3.0
  share_plus: ^10.0.2
  pdf: ^3.11.1
  printing: ^5.12.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  flutter_launcher_icons: ^0.13.1

flutter:
  uses-material-design: true

  assets:
    - assets/images/OnwaPay_logo.jpg
    - assets/images/MTN_logo.jpg
    - assets/images/Orange_logo.jpg
    - assets/images/EcoBank.jpg

flutter_icons:
  android: true
  ios: true
  image_path: "assets/images/OnwaPay_logo.jpg"
  adaptive_icon_background: "#ffffff"
  adaptive_icon_foreground: "assets/images/OnwaPay_logo.jpg"
